<!DOCTYPE html>
<html>
<head>
    <title>(BBB) Bernice Bryan Adventures</title>
    <style>
        /* A little CSS to make it nice */
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        
        /* The GIF starts as hidden */
        #surprise-container {
            margin-top: 20px;
            display: none; 
        }

        .feature-gif {
            width: 300px;
            height: auto;
            border-radius: 8px;
            border: 2px solid #ccc;
        }
    </style>
</head>
<body>

    <h1>Welcome to my little project bb!</h1>
    <h2>I hope work is going fine for you</h2>
    <p>If not, here's a little surprise for you teehee</p>
    <p>Click the button to see <strong>SURPRISE</strong>:</p>
    
    <button onclick="showSurprise()">Click Me!</button>

    <div id="surprise-container">
        <img id="gif-element" src="" alt="Dancing Capybara" class="feature-gif">
    </div>

    <script>
        function showSurprise() {
            // 1. Get the elements
            var container = document.getElementById("surprise-container");
            var gif = document.getElementById("gif-element");

            // 2. Set the actual direct GIF link
            gif.src = "https://media.tenor.com/F_rL08ZfD8gAAAAd/capylulu-capybara.gif";

            // 3. Make the container visible
            container.style.display = "block";

            console.log("The surprise was revealed!");
        }
    </script>

</body>
</html>
